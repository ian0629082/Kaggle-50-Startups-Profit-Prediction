<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Startup Profit AI Simulator</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #f7f0dd;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: #16212a;
      }

      #startup-profit-video {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 12%, rgba(244, 200, 74, 0.42), rgba(244, 200, 74, 0) 34%),
          radial-gradient(circle at 90% 8%, rgba(139, 92, 246, 0.22), rgba(139, 92, 246, 0) 32%),
          radial-gradient(circle at 82% 86%, rgba(0, 168, 168, 0.24), rgba(0, 168, 168, 0) 38%),
          #f7f0dd;
      }

      .grain {
        position: absolute;
        inset: 0;
        opacity: 0.16;
        background-image:
          linear-gradient(rgba(22, 33, 42, 0.16) 1px, rgba(22, 33, 42, 0) 1px),
          linear-gradient(90deg, rgba(22, 33, 42, 0.12) 1px, rgba(22, 33, 42, 0) 1px);
        background-size: 34px 34px;
        z-index: 0;
      }

      .meta {
        position: absolute;
        left: 72px;
        top: 54px;
        right: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.02em;
        z-index: 20;
      }

      .meta .tag {
        border: 3px solid #16212a;
        border-radius: 999px;
        padding: 12px 22px;
        background: rgba(247, 240, 221, 0.72);
        box-shadow: 6px 6px 0 rgba(22, 33, 42, 0.18);
      }

      .meta .count {
        font-family: Consolas, monospace;
        color: #00a8a8;
        text-shadow: 2px 2px 0 rgba(22, 33, 42, 0.16);
      }

      .stage {
        position: absolute;
        left: 72px;
        right: 72px;
        top: 180px;
        height: 1220px;
        perspective: 1600px;
        z-index: 10;
      }

      .slide-shell {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .slide-card {
        position: relative;
        width: 936px;
        height: 522px;
        transform-style: preserve-3d;
        border: 5px solid #16212a;
        border-radius: 22px;
        background: #f7f0dd;
        box-shadow: 24px 30px 0 rgba(22, 33, 42, 0.18), 0 34px 90px rgba(22, 33, 42, 0.22);
        overflow: hidden;
      }

      .slide-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .shine {
        position: absolute;
        inset: 0;
        background: linear-gradient(110deg, rgba(255, 255, 255, 0) 10%, rgba(255, 255, 255, 0.58) 48%, rgba(255, 255, 255, 0) 72%);
        transform: translateX(-120%);
        opacity: 0;
      }

      .caption-wrap {
        position: absolute;
        left: 70px;
        right: 70px;
        bottom: 230px;
        height: 230px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 30;
      }

      .caption {
        position: absolute;
        max-width: 880px;
        padding: 28px 34px;
        border: 4px solid #16212a;
        border-radius: 24px;
        background: rgba(247, 240, 221, 0.92);
        box-shadow: 12px 14px 0 rgba(0, 168, 168, 0.28);
        font-size: 42px;
        line-height: 1.38;
        font-weight: 800;
        text-align: center;
        opacity: 0;
        visibility: hidden;
      }

      .caption strong {
        color: #00a8a8;
      }

      .accent-line {
        position: absolute;
        left: 74px;
        right: 74px;
        bottom: 185px;
        height: 8px;
        border-radius: 999px;
        background: #00a8a8;
        transform-origin: left center;
        z-index: 25;
      }

      .corner-note {
        position: absolute;
        right: 72px;
        bottom: 76px;
        width: 300px;
        min-height: 135px;
        padding: 26px;
        box-sizing: border-box;
        background: #f4c84a;
        border: 4px solid #16212a;
        box-shadow: 12px 14px 0 rgba(22, 33, 42, 0.2);
        transform: rotate(-4deg);
        z-index: 18;
        font-size: 24px;
        font-weight: 900;
        line-height: 1.25;
      }

      .ring {
        position: absolute;
        width: 210px;
        height: 210px;
        border: 8px solid #f05d5e;
        border-radius: 50%;
        left: -54px;
        bottom: 104px;
        opacity: 0.5;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <div id="startup-profit-video" data-composition-id="startup-profit-video" data-start="0" data-duration="184" data-width="1080" data-height="1920">
      <audio
        id="narration"
        data-start="0"
        data-duration="183.88"
        data-track-index="0"
        src="assets/narration_yunjhe.wav"
        data-volume="1"
      ></audio>
      <div class="grain" data-layout-ignore></div>
      <div class="meta">
        <div class="tag">Startup Profit AI Simulator</div>
        <div class="count" id="counter">01 / 20</div>
      </div>
      <div class="stage" id="stage"></div>
      <div class="caption-wrap" id="captions"></div>
      <div class="accent-line"></div>
      <div class="corner-note">CRISP-DM<br />Data to Decision</div>
      <div class="ring" data-layout-ignore></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      const DURATION = 184;
      const SLIDE_DURATION = 9.2;
      const SLIDES = Array.from({ length: 20 }, (_, i) => ({
        src: `assets/slides/image${i + 1}.png`,
      }));
      const CAPTIONS = [
        { start: 0.3, end: 8.2, text: "從一個實際問題開始：新創公司如何分配有限資源，提高利潤？" },
        { start: 9.5, end: 17.4, text: "使用 Kaggle 50 Startups 資料集，分析支出與地區對利潤的影響。" },
        { start: 18.7, end: 26.6, text: "流程採用 CRISP-DM，從商業理解一路走到部署。" },
        { start: 27.9, end: 35.8, text: "目標不只預測利潤，也要找出真正推動成長的支出。" },
        { start: 37.1, end: 45.0, text: "資料包含五十筆新創公司資料，以及五個核心欄位。" },
        { start: 46.3, end: 54.2, text: "利潤分布接近常態，州別樣本也相對平衡。" },
        { start: 55.5, end: 63.4, text: "研發支出與利潤的相關係數高達零點九七三。" },
        { start: 64.7, end: 72.6, text: "行銷支出有正向關聯，行政與地區影響較弱。" },
        { start: 73.9, end: 81.8, text: "有效離群值被保留，因為它代表真實商業失敗案例。" },
        { start: 83.1, end: 91.0, text: "類別欄位 One Hot Encoding，數值欄位使用 StandardScaler。" },
        { start: 92.3, end: 100.2, text: "模型比較包含線性迴歸、Ridge，以及 Random Forest。" },
        { start: 101.5, end: 109.4, text: "Random Forest 在測試集上取得最佳誤差表現。" },
        { start: 110.7, end: 118.6, text: "交叉驗證顯示，線性模型依然穩定且具解釋性。" },
        { start: 119.9, end: 127.8, text: "特徵重要性指出，研發支出是最主要的預測訊號。" },
        { start: 129.1, end: 137.0, text: "SHAP 分析支持相同結論：高研發投入推升預測利潤。" },
        { start: 138.3, end: 146.2, text: "最佳特徵組合很精簡：研發支出加上行銷支出。" },
        { start: 147.5, end: 155.4, text: "兩特徵模型達到最低 RMSE，並維持高 R squared。" },
        { start: 156.7, end: 164.6, text: "商業決策要抓住關鍵變數，而不是盲目增加欄位。" },
        { start: 165.9, end: 173.8, text: "模型被封裝成 pipeline，支援前端模擬器即時預測。" },
        { start: 175.1, end: 183.3, text: "這是一個從資料分析到互動部署的完整 AI 決策流程。" },
      ];

      const stage = document.getElementById("stage");
      const captions = document.getElementById("captions");
      const counter = document.getElementById("counter");

      SLIDES.forEach((slide, i) => {
        const shell = document.createElement("div");
        shell.className = "slide-shell";
        shell.id = `slide-${i + 1}`;
        shell.setAttribute("data-start", (i * SLIDE_DURATION).toFixed(2));
        shell.setAttribute("data-duration", SLIDE_DURATION.toFixed(2));
        shell.setAttribute("data-track-index", "1");
        shell.innerHTML = `<div class="slide-card"><img src="${slide.src}" crossorigin="anonymous" /><div class="shine" data-layout-ignore></div></div>`;
        stage.appendChild(shell);
      });

      CAPTIONS.forEach((group, i) => {
        const el = document.createElement("div");
        el.className = "caption";
        el.id = `caption-${i}`;
        el.textContent = group.text;
        captions.appendChild(el);
      });

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.fromTo(".meta .tag", { y: -40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.65, ease: "expo.out" }, 0.2);
      tl.fromTo(".meta .count", { x: 35, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, ease: "back.out(1.2)" }, 0.35);
      tl.fromTo(".corner-note", { rotation: -11, y: 80, opacity: 0 }, { rotation: -4, y: 0, opacity: 1, duration: 0.75, ease: "power3.out" }, 0.55);
      tl.fromTo(".accent-line", { scaleX: 0 }, { scaleX: 1, duration: 0.9, ease: "power4.out" }, 0.55);
      tl.to(".ring", { scale: 1.08, rotation: 8, yoyo: true, repeat: Math.floor(DURATION / 4) - 1, duration: 2, ease: "sine.inOut" }, 0);
      tl.to(".grain", { x: 18, y: -18, yoyo: true, repeat: Math.floor(DURATION / 6) - 1, duration: 3, ease: "sine.inOut" }, 0);

      SLIDES.forEach((slide, i) => {
        const start = i * SLIDE_DURATION;
        const shell = `#slide-${i + 1}`;
        const card = `${shell} .slide-card`;
        tl.set(shell, { visibility: "visible" }, start);
        tl.set(counter, { textContent: `${String(i + 1).padStart(2, "0")} / 20` }, start + 0.05);
        tl.fromTo(
          card,
          { opacity: 0, x: i % 2 === 0 ? 260 : -260, rotationY: i % 2 === 0 ? -42 : 42, rotationZ: i % 3 === 0 ? -2 : 2, scale: 0.86 },
          { opacity: 1, x: 0, rotationY: 0, rotationZ: i % 3 === 0 ? -1 : 1, scale: 1, duration: 0.9, ease: i % 2 === 0 ? "power4.out" : "expo.out" },
          start + 0.16,
        );
        tl.to(card, { y: i % 2 === 0 ? -16 : 16, duration: SLIDE_DURATION - 1.1, ease: "none" }, start + 0.9);
        tl.to(`${card}`, { boxShadow: "18px 24px 0 rgba(22, 33, 42, 0.16), 0 30px 76px rgba(22, 33, 42, 0.20)", duration: 0.8, ease: "sine.inOut" }, start + 1.2);
        tl.fromTo(`${card} .shine`, { opacity: 0, x: "-120%" }, { opacity: 1, x: "240%", duration: 0.85, ease: "power2.inOut" }, start + 0.78);
      });

      CAPTIONS.forEach((group, i) => {
        const el = `#caption-${i}`;
        tl.set(el, { visibility: "visible" }, group.start);
        tl.fromTo(el, { opacity: 0, y: 36, scale: 0.96 }, { opacity: 1, y: 0, scale: 1, duration: 0.48, ease: "power3.out" }, group.start);
        tl.to(el, { opacity: 0, scale: 0.97, duration: 0.16, ease: "power2.in" }, group.end - 0.16);
        tl.set(el, { opacity: 0, visibility: "hidden" }, group.end);
      });

      tl.to("[data-composition-id='startup-profit-video']", { backgroundColor: "#16212a", duration: 0.8, ease: "power1.inOut" }, DURATION - 1);
      tl.to(".stage, .caption-wrap, .meta, .corner-note, .accent-line", { opacity: 0, duration: 0.65, ease: "power2.in" }, DURATION - 0.8);

      window.__timelines["startup-profit-video"] = tl;
    </script>
  </body>
</html>
